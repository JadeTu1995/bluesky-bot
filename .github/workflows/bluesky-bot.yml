name: Bluesky Bot

on:
  schedule:
    - cron: '0 1 * * *'  # 早上9点
    - cron: '0 8 * * *'  # 下午4点
  workflow_dispatch:

jobs:
  send-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: |
          pip install atproto gspread APScheduler requests python-dotenv Pillow
      - name: 创建环境变量文件
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
        run: |
          echo "BLUESKY_HANDLE=$BLUESKY_HANDLE" > .env
          echo "BLUESKY_PASSWORD=$BLUESKY_PASSWORD" >> .env
          echo "GOOGLE_SPREADSHEET_ID=$GOOGLE_SPREADSHEET_ID" >> .env
          echo "GOOGLE_CREDENTIALS_FILE=credentials.json" >> .env
      - name: 创建Google凭证文件
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          echo "$GOOGLE_CREDENTIALS_JSON" > credentials.json
      - name: 运行发送程序
        run: python 详细追踪发送_新版.py
